#untuk build image docker dan kirim ke registry sesuai variable IMAGE_REGISTRY yang ada di gitlab-runner
.worker_build_image_template:
  stage: build
  image:
    name: petrahub.petra.ac.id/eksternal/kaniko-executor:v1.9.0-debug
    entrypoint: [""]
  script:
    - if [[ "$CI_COMMIT_TAG" =~ v[0-9].+ ]]; then IMAGE_REGISTRY_TAG=$CI_COMMIT_TAG; fi #bila commit tag tidak diberi maka pakai default
    - mkdir -p /kaniko/.docker
    - echo $IMAGE_REGISTRY/$PROJECT_GROUP/$NAMESPACE/$CI_PROJECT_NAME-worker:$IMAGE_REGISTRY_TAG
    - echo "{\"auths\":{\"$IMAGE_REGISTRY\":{\"username\":\"$IMAGE_REGISTRY_USER\",\"password\":\"$IMAGE_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --cache=true --cache-copy-layers --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/$DOCKER_DIR_WORKER/Dockerfile --destination $IMAGE_REGISTRY/$PROJECT_GROUP/$NAMESPACE/$CI_PROJECT_NAME-worker:$IMAGE_REGISTRY_TAG
  retry: 2

.worker_deploy_image_template:
  stage: deploy
  image:
    name: petrahub.petra.ac.id/eksternal/bitnami-kubectl
    entrypoint: [""]
  script:
    - get_var() { local target_var="${1}_${ENV_SUFFIX}"; echo "${!target_var}"; }
    - if [[ "$CI_COMMIT_TAG" =~ v[0-9].+ ]]; then IMAGE_REGISTRY_TAG=$CI_COMMIT_TAG; fi
    - CLEAN_PROJECT_NAME=$(echo "$CI_PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | tr -s '-' | sed 's/^-//; s/-$//')
    - sed -i "s/\${CI_PROJECT_NAME}/$CLEAN_PROJECT_NAME/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${IMAGE_REGISTRY}/$IMAGE_REGISTRY/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${NAMESPACE}/$NAMESPACE/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${PROJECT_GROUP}/$PROJECT_GROUP/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${IMAGE_REGISTRY_TAG}/$IMAGE_REGISTRY_TAG/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${CI_PROJECT_TITLE}/$CI_PROJECT_TITLE/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${INGRESS_URL}/$(get_var INGRESS_URL)/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - sed -i "s/\${CI_COMMIT_SHORT_SHA}/$CI_COMMIT_SHORT_SHA/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - echo $IMAGE_REGISTRY/$PROJECT_GROUP/$NAMESPACE/$CI_PROJECT_NAME-worker:$IMAGE_REGISTRY_TAG
    - echo -n $(get_var KUBE_CONFIG) | base64 -d > $KUBECONFIG
    - kubectl apply -f $DEPLOYMENT_WORKER_DIR/deployment.yaml -n $NAMESPACE

.worker_deploy_hpa_template:
  stage: hpa
  image:
    name: petrahub.petra.ac.id/eksternal/bitnami-kubectl
    entrypoint: [""]
  script:
    - get_var() { local target_var="${1}_${ENV_SUFFIX}"; echo "${!target_var}"; }
    - get_var_name() { echo "${1}_${ENV_SUFFIX}"; }
    - CLEAN_PROJECT_NAME=$(echo "$CI_PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | tr -s '-' | sed 's/^-//; s/-$//')
    - sed -i "s/\${CI_PROJECT_NAME}/$CLEAN_PROJECT_NAME/g" $DEPLOYMENT_WORKER_DIR/*.yaml
    - echo -n $(get_var KUBE_CONFIG) | base64 -d > $KUBECONFIG; echo "using variable:" $(get_var_name KUBE_CONFIG)
    - kubectl apply -f $DEPLOYMENT_WORKER_DIR/hpa.yaml -n $NAMESPACE
