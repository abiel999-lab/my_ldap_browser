[supervisord]
nodaemon=true

[supervisorctl]

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=/bin/sh -c "php /var/www/html/artisan queue:work --queue=default,job_a,job_b --sleep=3 --tries=5 --max-time=18000"
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=8
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker.log
stopwaitsecs=1800

