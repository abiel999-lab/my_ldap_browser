apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${CI_PROJECT_NAME}-worker # sesuaikan dengan nama deployment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${CI_PROJECT_NAME}-worker # sesuaikan dengan nama deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          # type: Utilization
          # averageUtilization: 80
          type: AverageValue
          averageValue: 1000m # 50% dari limit di deployment
    - type: Resource
      resource:
        name: memory
        target:
          # type: Utilization
          # averageUtilization: 80
          type: AverageValue
          averageValue: 512Mi # 50% dari limit di deployment
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100 # bisa naik sampai 2x
          periodSeconds: 60
        - type: Pods
          value: 2 # atau max tambah 2 pod
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50 # turunin max 50%
          periodSeconds: 60
        - type: Pods
          value: 1 # atau 1 pod per menit
          periodSeconds: 60
      selectPolicy: Max
