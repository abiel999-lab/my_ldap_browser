apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${CI_PROJECT_NAME} #sesuaikan dengan nama deployment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${CI_PROJECT_NAME} #sesuaikan dengan nama deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          # type: Utilization
          # averageUtilization: 80
          type: AverageValue
          averageValue: 500m
    - type: Resource
      resource:
        name: memory
        target:
          # type: Utilization
          # averageUtilization: 80
          type: AverageValue
          averageValue: 300Mi
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 10 # web perlu cepat respon
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120 # jangan terlalu cepat turun
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
