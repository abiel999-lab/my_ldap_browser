apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: ${CI_PROJECT_NAME}-transport
  namespace: ${NAMESPACE}
spec:
  forwardingTimeouts:
    dialTimeout: 3600s
    responseHeaderTimeout: 3600s
    idleConnTimeout: 3600s
